services:
  # ── Database Service with Authentication ───────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: pureair-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pureair_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: hospital_aqi
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js:ro
    command: ["--auth"]
    networks:
      - pureair-network

  # ── Caching Service with Password Protection ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pureair-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - pureair-network

  # ── Backend Server (API & Embedded MQTT Broker) ────────────────────────
  pureair-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pureair-backend
    restart: unless-stopped
    ports:
      - "5002:5002"  # Express API Port
      - "1886:1886"  # Aedes MQTT Broker Port
    environment:
      - NODE_ENV=production
      - PORT=5002
      - MQTT_PORT=1886
      - MQTT_BROKER_URL=mqtt://pureair-backend:1886
      - MQTT_USERNAME=hospital_node
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=mongodb://pureair_admin:${MONGO_APP_PASSWORD}@mongodb:27017/hospital_aqi?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${FRONTEND_URL}
      - PURPLEAIR_API_KEY=${PURPLEAIR_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - BEHIND_HTTPS_PROXY=true
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/.env:/app/.env:ro
    networks:
      - pureair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend Web Server (React app served via Nginx) ───────────────────
  pureair-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pureair-client
    restart: unless-stopped
    ports:
      - "80:80"      # Production Web Port
    environment:
      - VITE_API_URL=http://localhost:5002
    depends_on:
      - pureair-backend
    networks:
      - pureair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy with SSL/TLS ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pureair-nginx
    restart: unless-stopped
    ports:
      - "443:443"    # HTTPS
      - "80:80"      # HTTP redirect to HTTPS
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - pureair-client
      - pureair-backend
    networks:
      - pureair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health.html"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  nginx_ssl:

networks:
  pureair-network:
    driver: bridge