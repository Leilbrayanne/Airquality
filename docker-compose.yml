services:
  # ── Database Service ─────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: pureair-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pureair-network

  # ── Caching Service (JWT Revocation & General Caching) ───────
  redis:
    image: redis:7-alpine
    container_name: pureair-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - pureair-network

  # ── Backend Server (API & Embedded MQTT Broker) ──────────────
  pureair-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pureair-backend
    restart: always
    ports:
      - "5002:5002"  # Express API Port
      - "1886:1886"  # Aedes MQTT Broker Port
    environment:
      - PORT=5002
      - NODE_ENV=development
      - MQTT_PORT=1886
      - MQTT_BROKER_URL=mqtt://pureair-backend:1886
      - MQTT_USERNAME=hospital_node
      - MQTT_PASSWORD=${MQTT_PASSWORD:-dev_mqtt_password_for_testing}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - MONGODB_URI=mongodb://mongodb:27017/hospital_aqi
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    networks:
      - pureair-network

  # ── Frontend Web Server (React app served via Nginx) ─────────
  pureair-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pureair-client
    restart: always
    ports:
      - "80:80"      # Production Web Port
    depends_on:
      - pureair-backend
    networks:
      - pureair-network

volumes:
  mongodb_data:

networks:
  pureair-network:
    driver: bridge
